<div class="users-container">
  <div class="page-title-section">
    <h1>Users Management</h1>
    <p>View and manage all registered users on the platform</p>
  </div>

  <div class="table-card shadow-panel">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>
            <div class="user-info">
              <div class="avatar-circle">{{ user.username ? user.username[0].toUpperCase() : 'U' }}</div>
              <span class="user-name">{{ user.username }}</span>
            </div>
          </td>
          <td class="email-cell">{{ user.email }}</td>
          <td>
            <span class="status-badge" [class.active]="!user.isBlocked" [class.blocked]="user.isBlocked">
              {{ user.isBlocked ? 'Blocked' : 'Active' }}
            </span>
          </td>
          <td>
            <button class="action-btn" [ngClass]="user.isBlocked ? 'unblock-btn' : 'block-btn'" (click)="toggleBlock(user._id, user.isBlocked)">
              {{ user.isBlocked ? 'Unblock' : 'Block' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination-section" *ngIf="totalPages > 1">
      <button class="page-nav" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">Prev</button>

      <div class="page-numbers">
        <button *ngFor="let page of getPagesArray()"
                [class.active]="page === currentPage"
                (click)="goToPage(page)">
          {{ page }}
        </button>
      </div>

      <button class="page-nav" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">Next</button>
    </div>

    <div *ngIf="users.length === 0" class="loading-state">
      <p>No users found for this page.</p>
    </div>
  </div>
</div>
